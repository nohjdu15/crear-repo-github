name: Crear repositorio en GitHub

on:
  workflow_dispatch:
    inputs:
      repository_name:
        description: "Nombre del nuevo repositorio (se normalizará a minúsculas)"
        required: true
        type: string
      description:
        description: "Descripción del repositorio"
        required: false
        type: string
      collaborators:
        description: "Usuarios colaboradores separados por espacio (opcional)"
        required: false
        type: string

jobs:
  create-repo:
    name: Crear repo y añadir colaboradores
    runs-on: ubuntu-latest

    env:
      # Owner del repositorio actual (usuario u organización)
      OWNER: ${{ github.repository_owner }}
      # Token seguro para crear repositorios, definido como secreto en GitHub
      REPO_CREATION_TOKEN: ${{ secrets.REPO_CREATION_TOKEN }}
      REPO_NAME: ${{ inputs.repository_name }}
      REPO_DESCRIPTION: ${{ inputs.description }}
      COLLABORATORS: ${{ inputs.collaborators }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Crear repositorio y añadir colaboradores
        run: |
          echo "Creando repositorio '$REPO_NAME' para '$OWNER'..."
          # COLLABORATORS es una cadena con usuarios separados por espacio.
          # Al expandirla al final del comando, cada usuario pasa como un argumento.
          python -m src.create_github_repo \
            "$OWNER" \
            "$REPO_NAME" \
            "$REPO_DESCRIPTION" \
            $COLLABORATORS
        env:
          REPO_CREATION_TOKEN: ${{ env.REPO_CREATION_TOKEN }}

      - name: Calcular nombre normalizado del repositorio
        id: normalize-name
        run: |
          python - << 'PY'
          import os
          import re

          raw = os.environ.get("REPO_NAME", "")
          name = raw.strip().lower().replace(" ", "-")
          name = re.sub(r"[^a-z0-9_\-]", "", name)
          if not name:
              raise SystemExit("Nombre de repositorio inválido después de normalizar")

          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as f:
              f.write(f"NORMALIZED_REPO_NAME={name}\n")
          PY

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Clonar repo e instalar módulos BMAD (robusto)
        run: |
          set -e

          echo "Clonando repositorio..."
          git clone "https://x-access-token:${REPO_CREATION_TOKEN}@github.com/${OWNER}/${NORMALIZED_REPO_NAME}.git" new-repo

          cd new-repo || { echo "No se pudo entrar al repo"; exit 1; }

          echo "Configurando git..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Forzando modo CI..."
          export CI=true
          export NODE_ENV=production

          echo "Intentando instalación BMAD (modo estándar)..."
          if npx --yes bmad-method install --modules bmm,bmb --yes; then
            echo "Instalación BMAD exitosa (modo estándar)"
          else
            echo "Fallo modo estándar, intentando con yes..."

            if yes | npx bmad-method install --modules bmm,bmb; then
              echo "Instalación BMAD exitosa (con yes)"
            else
              echo "Fallo con yes, intentando con expect..."

              sudo apt-get update && sudo apt-get install -y expect

              expect <<EOF
              spawn npx bmad-method install --modules bmm,bmb
              set timeout -1
              expect {
                "(y/N)" { send "y\r"; exp_continue }
                "(Y/n)" { send "y\r"; exp_continue }
                eof
              }
EOF

            fi
          fi

          echo "Verificando instalación..."
          ls -la
          ls -la node_modules || echo "No hay node_modules"

          echo "Estado git..."
          git status

          git add -A

          if git diff --cached --quiet; then
            echo "No hay cambios que commitear"
          else
            git commit -m "Install BMAD modules (bmm, bmb)"
            git push origin HEAD
          fi
        env:
          REPO_CREATION_TOKEN: ${{ env.REPO_CREATION_TOKEN }}
